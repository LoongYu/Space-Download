name: Build Release

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: echo "VERSION=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller streamlit pywebview deep-translator

      - name: Build exe
        run: |
          pyinstaller main.py --name=SpaceDownload --windowed --onedir --noconfirm --clean "--add-data=yt_dlp_gui.py;." --collect-all=streamlit --collect-all=webview --collect-all=yt_dlp --exclude-module=matplotlib --exclude-module=notebook --exclude-module=test

      - name: Rename and zip output
        shell: pwsh
        run: |
          Rename-Item -Path "dist/SpaceDownload" -NewName "SpaceDownload-${{ steps.version.outputs.VERSION }}"
          Compress-Archive -Path "dist/SpaceDownload-${{ steps.version.outputs.VERSION }}" -DestinationPath "dist/SpaceDownload-${{ steps.version.outputs.VERSION }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceDownload-Windows
          path: dist/SpaceDownload-${{ steps.version.outputs.VERSION }}.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "VERSION=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller streamlit pywebview deep-translator

      - name: Build app
        run: |
          pyinstaller main.py --name=SpaceDownload --windowed --onedir --noconfirm --clean --add-data=yt_dlp_gui.py:. --collect-all=streamlit --collect-all=webview --collect-all=yt_dlp --exclude-module=matplotlib --exclude-module=notebook --exclude-module=test

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg --volname "Space Download" --window-pos 200 120 --window-size 800 400 --icon-size 100 --icon SpaceDownload.app 200 190 --hide-extension SpaceDownload.app --app-drop-link 600 185 "dist/SpaceDownload-${{ steps.version.outputs.VERSION }}.dmg" dist/SpaceDownload.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceDownload-macOS
          path: dist/SpaceDownload-${{ steps.version.outputs.VERSION }}.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Set version
        id: version
        run: echo "VERSION=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SpaceDownload ${{ steps.version.outputs.VERSION }}"
          tag_name: "${{ steps.version.outputs.VERSION }}"
          files: |
            SpaceDownload-Windows/*
            SpaceDownload-macOS/*
          generate_release_notes: true
