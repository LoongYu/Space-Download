name: Build Windows

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name (e.g., 2026032901)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r "bundle/requirements/requirements-win-x64.txt"
          python -m pip install -r "bundle/requirements/requirements-win-x64-pyinstaller.txt"
          python -m pip install streamlit==1.50.0 pywebview deep-translator

      - name: Build exe
        run: |
          python -m PyInstaller --noconfirm --clean SpaceDownload.spec
          Rename-Item -Path "dist/SpaceDownload" -NewName "SpaceDownload-${{ github.event.inputs.release_name }}-windows-x64"

      - name: Zip dist folder
        run: |
          $bundle = "SpaceDownload-${{ github.event.inputs.release_name }}-windows-x64"
          Compress-Archive -Path "dist/$bundle" -DestinationPath "dist/$bundle.zip"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $asset = "SpaceDownload-${{ github.event.inputs.release_name }}-windows-x64.zip"
          gh release delete-asset "${{ github.event.inputs.release_name }}" "$asset" -y 2>$null
          gh release upload "${{ github.event.inputs.release_name }}" "dist/$asset"
