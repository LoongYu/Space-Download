name: Build Windows

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name (e.g., 2026032901)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller streamlit pywebview deep-translator

      - name: Build exe
        run: >
          pyinstaller main.py
          --name=SpaceDownload-${{ github.event.inputs.release_name }}
          --windowed --onedir --noconfirm --clean
          "--add-data=yt_dlp_gui.py;."
          --collect-all=streamlit
          --collect-all=webview
          --collect-all=yt_dlp
          --hidden-import=blinker
          --hidden-import=packaging
          --hidden-import=tenacity
          --hidden-import=toml
          --hidden-import=cachetools
          --hidden-import=gitpython
          --hidden-import=pyarrow
          --exclude-module=matplotlib
          --exclude-module=notebook
          --exclude-module=test

      - name: Zip dist folder
        run: Compress-Archive -Path "dist/SpaceDownload-${{ github.event.inputs.release_name }}" -DestinationPath "dist/SpaceDownload-${{ github.event.inputs.release_name }}.zip"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $asset = "SpaceDownload-${{ github.event.inputs.release_name }}.zip"
          gh release delete-asset "${{ github.event.inputs.release_name }}" "$asset" -y 2>$null
          gh release upload "${{ github.event.inputs.release_name }}" "dist/$asset"
